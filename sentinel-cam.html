<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SENTINEL CAM</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0f1a; color:#fff;
  font-family: 'Courier New', monospace;
  min-height:100vh; display:flex; flex-direction:column;
}

/* VIDEO PREVIEW */
.vid-wrap {
flex:1; position:relative; background:#000;
min-height:200px;
}
video#preview {
width:100%; height:100%;
object-fit:cover; display:block;
transform:scaleX(-1);
}
.vid-overlay {
position:absolute; inset:0;
pointer-events:none; z-index:2;
}
.corner { position:absolute; width:20px; height:20px; border-color:#00e5ff; border-style:solid; opacity:.7; }
.corner.tl{top:10px;left:10px;border-width:2px 0 0 2px;}
.corner.tr{top:10px;right:10px;border-width:2px 2px 0 0;}
.corner.bl{bottom:10px;left:10px;border-width:0 0 2px 2px;}
.corner.br{bottom:10px;right:10px;border-width:0 2px 2px 0;}
.stream-badge {
position:absolute; top:10px; left:50%; transform:translateX(-50%);
background:rgba(255,60,80,.2); border:1px solid #ff3c50;
color:#ff3c50; padding:4px 14px; border-radius:2px;
font-size:11px; letter-spacing:3px;
display:none; align-items:center; gap:6px;
}
.stream-badge.on { display:flex; }
.stream-badge .dot { width:6px; height:6px; border-radius:50%; background:#ff3c50; animation:blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.no-cam {
position:absolute; inset:0; background:#000;
display:flex; flex-direction:column;
align-items:center; justify-content:center; gap:10px;
}
.no-cam svg { opacity:.3; }
.no-cam p { font-size:12px; color:#336; letter-spacing:1px; }

/* BOTTOM PANEL */
.panel {
background:#0d1420; border-top:1px solid #1a2a3a;
padding:14px 16px;
}

/* My PIN display */
.my-pin-box {
background:#000; border:2px solid #00e5ff;
border-radius:8px; padding:12px 16px;
text-align:center; margin-bottom:12px;
}
.my-pin-label { font-size:9px; letter-spacing:3px; color:#336; margin-bottom:6px; }
.my-pin-val {
font-size:28px; font-weight:bold;
color:#00e5ff; letter-spacing:4px;
text-shadow: 0 0 20px rgba(0,229,255,.6);
}
.my-pin-hint { font-size:10px; color:#446; margin-top:6px; }

/* Cam select + start */
.cam-row { display:flex; gap:8px; margin-bottom:10px; }
select#camSelect {
flex:1; background:#111; border:1px solid #1a2a3a;
color:#fff; font-family:inherit; font-size:12px;
padding:9px 10px; border-radius:4px; outline:none;
}
.btn {
padding:9px 18px; border:none; border-radius:4px;
font-family:inherit; font-size:12px; font-weight:bold;
cursor:pointer; letter-spacing:1px;
}
.btn-start { background:#00e5ff; color:#000; }
.btn-stop { background:#ff3c50; color:#fff; display:none; }
.btn-stream { background:#00ff88; color:#000; }
.btn:active { opacity:.8; }

/* Stream to field */
.stream-row { display:flex; gap:8px; margin-bottom:10px; }
input#tvPinInput {
flex:1; background:#111; border:1px solid #1a2a3a;
color:#fff; font-family:inherit; font-size:14px;
padding:9px 12px; border-radius:4px; outline:none;
letter-spacing:2px;
}
input#tvPinInput::placeholder { color:#336; letter-spacing:0; }
input#tvPinInput:focus { border-color:#00e5ff; }

/* Viewers */
.viewers { font-size:10px; color:#336; letter-spacing:1px; margin-bottom:8px; }
.viewer-chip {
display:inline-flex; align-items:center; gap:4px;
background:#112; border:1px solid #00ff88;
border-radius:2px; padding:2px 8px; margin:2px;
font-size:10px; color:#00ff88;
}
.viewer-chip .vd { width:5px; height:5px; border-radius:50%; background:#00ff88; animation:blink 1.5s infinite; }

/* Log */
.log { max-height:70px; overflow-y:auto; }
.log-line { font-size:10px; color:#446; padding:1px 0; }
.log-line em { color:#aac; font-style:normal; }
.log-line.ok em { color:#00ff88; }
.log-line.err em { color:#ff3c50; }
</style>

</head>
<body>

<div class="vid-wrap">
  <div class="no-cam" id="noCam">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1">
      <path d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.889L15 14M3 8a2 2 0 012-2h10a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
    </svg>
    <p>TAP START CAMERA</p>
  </div>
  <video id="preview" autoplay muted playsinline></video>
  <div class="vid-overlay">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div class="stream-badge" id="streamBadge"><div class="dot"></div>STREAMING</div>
  </div>
</div>

<div class="panel">
  <!-- My Camera PIN -->
  <div class="my-pin-box">
    <div class="my-pin-label">MY CAMERA PIN</div>
    <div class="my-pin-val" id="myPin">—</div>
    <div class="my-pin-hint">TV can type this PIN to connect to you</div>
  </div>

  <!-- Camera select -->

  <div class="cam-row">
    <select id="camSelect"><option value="">Select camera…</option></select>
    <button class="btn btn-start" id="startBtn" onclick="startCam()">START</button>
    <button class="btn btn-stop" id="stopBtn" onclick="stopCam()">STOP</button>
  </div>

  <!-- Stream to TV -->

  <div class="stream-row">
    <input id="tvPinInput" placeholder="Type TV PIN (e.g. SNT-1234)" autocomplete="off" autocapitalize="characters">
    <button class="btn btn-stream" onclick="doStream()">STREAM →</button>
  </div>

  <!-- Connected viewers -->

  <div class="viewers" id="viewersBox"></div>

  <!-- Log -->

  <div class="log" id="log"></div>
</div>

<script>
// ════════════════════════════════════════════
//  SENTINEL CAM
//  Signaling: Firebase REST (pure HTTPS fetch)
//  Streaming: WebRTC direct peer-to-peer
// ════════════════════════════════════════════

// Free Firebase project — public read/write rules
// Using a shared demo project; each session uses a unique PIN
const FB = 'https://sentinal-cam-default-rtdb.asia-southeast1.firebasedatabase.app';

const C = {
  myPin: null,
  stream: null,
  peers: {},    // tvPin -> RTCPeerConnection
  viewers: [],
  polling: null
};

// ── Init ──
function init() {
  C.myPin = 'SNT-' + Math.floor(1000 + Math.random() * 9000);
  document.getElementById('myPin').textContent = C.myPin;
  enumCams();
  startPolling();
  log('Ready', `Camera PIN: ${C.myPin}`, 'ok');
}

// ── Firebase helpers ──
async function fbSet(path, data) {
  try {
    await fetch(`${FB}/${path}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
  } catch(e) {}
}

async function fbGet(path) {
  try {
    const r = await fetch(`${FB}/${path}.json`);
    if (!r.ok) return null;
    return await r.json();
  } catch(e) { return null; }
}

async function fbDelete(path) {
  try { await fetch(`${FB}/${path}.json`, { method: 'DELETE' }); } catch(e) {}
}

// ── Poll our inbox for incoming messages ──
function startPolling() {
  C.polling = setInterval(async () => {
    const inbox = await fbGet(`inbox/${C.myPin}`);
    if (!inbox) return;

    for (const [key, msg] of Object.entries(inbox)) {
      await fbDelete(`inbox/${C.myPin}/${key}`);
      try {
        if (msg.type === 'offer') {
          handleOffer(msg.from, msg.sdp);
        } else if (msg.type === 'answer') {
          const pc = C.peers[msg.from];
          if (pc) await pc.setRemoteDescription({ type: 'answer', sdp: msg.sdp });
        } else if (msg.type === 'ice') {
          const pc = C.peers[msg.from];
          if (pc) await pc.addIceCandidate(new RTCIceCandidate(msg.candidate)).catch(()=>{});
        }
      } catch(e) {}
    }
  }, 2000);
}

// ── Send message to someone's inbox ──
async function send(toPin, msg) {
  const key = Date.now() + '_' + Math.random().toString(36).slice(2,6);
  await fbSet(`inbox/${toPin}/${key}`, { ...msg, from: C.myPin });
}

// ── Handle incoming offer from TV ──
async function handleOffer(tvPin, offerSdp) {
  if (!C.stream) { log('TV tried to connect', 'start camera first', 'err'); return; }
  if (C.peers[tvPin]) return;

  log('TV calling…', tvPin, '');

  const pc = makePeerConn(tvPin);
  C.stream.getTracks().forEach(t => pc.addTrack(t, C.stream));

  await pc.setRemoteDescription({ type: 'offer', sdp: offerSdp });
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  await send(tvPin, { type: 'answer', sdp: pc.localDescription.sdp });

  log('Answer sent', tvPin, 'ok');
}

// ── Cam calls TV by typing TV PIN ──
async function doStream() {
  if (!C.stream) { alert('Start camera first!'); return; }
  const tvPin = document.getElementById('tvPinInput').value.trim().toUpperCase();
  if (!tvPin || !tvPin.startsWith('SNT-')) { alert('Enter TV PIN like SNT-1234'); return; }
  document.getElementById('tvPinInput').value = '';
  if (C.peers[tvPin]) { log('Already connected', tvPin, 'ok'); return; }

  log('Calling TV…', tvPin, '');

  const pc = makePeerConn(tvPin);
  C.stream.getTracks().forEach(t => pc.addTrack(t, C.stream));

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await send(tvPin, { type: 'offer', sdp: pc.localDescription.sdp });

  log('Offer sent', tvPin, '');
}

// ── Create RTCPeerConnection ──
function makePeerConn(remotePin) {
  const pc = new RTCPeerConnection({
    iceServers: [
      { urls: 'stun:stun.l.google.com:19302' },
      { urls: 'stun:stun1.l.google.com:19302' },
      { urls: 'stun:stun2.l.google.com:19302' },
      { urls: 'stun:stun3.l.google.com:19302' },
    ]
  });
  C.peers[remotePin] = pc;

  pc.onicecandidate = e => {
    if (e.candidate) send(remotePin, { type: 'ice', candidate: e.candidate.toJSON() });
  };

  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'connected') {
      addViewer(remotePin);
      document.getElementById('streamBadge').classList.add('on');
      log('✅ Connected!', remotePin, 'ok');
    }
    if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
      removeViewer(remotePin);
      delete C.peers[remotePin];
    }
  };

  return pc;
}

// ── Camera ──
async function enumCams() {
  try {
    const devs = await navigator.mediaDevices.enumerateDevices();
    const sel = document.getElementById('camSelect');
    sel.innerHTML = '<option value="">Select camera…</option>';
    devs.filter(d => d.kind === 'videoinput').forEach((d, i) => {
      const o = document.createElement('option');
      o.value = d.deviceId;
      o.textContent = d.label || `Camera ${i+1}`;
      sel.appendChild(o);
    });
  } catch(e) {}
}

async function startCam() {
  const deviceId = document.getElementById('camSelect').value;
  try {
    C.stream = await navigator.mediaDevices.getUserMedia({
      video: deviceId ? { deviceId: { exact: deviceId } } : { facingMode: 'environment', width: 1280, height: 720 },
      audio: true
    });
  } catch(e) {
    C.stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false });
  }
  document.getElementById('preview').srcObject = C.stream;
  document.getElementById('noCam').style.display = 'none';
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'inline-block';
  await enumCams();
  log('Camera started', '', 'ok');

  // Update active connections with new stream
  for (const [pin, pc] of Object.entries(C.peers)) {
    C.stream.getTracks().forEach(t => {
      try { pc.addTrack(t, C.stream); } catch(e) {}
    });
  }
}

function stopCam() {
  if (C.stream) C.stream.getTracks().forEach(t => t.stop());
  C.stream = null;
  document.getElementById('preview').srcObject = null;
  document.getElementById('noCam').style.display = 'flex';
  document.getElementById('startBtn').style.display = 'inline-block';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('streamBadge').classList.remove('on');
  log('Camera stopped', '', '');
}

// ── Viewers ──
function addViewer(pin) {
  if (!C.viewers.includes(pin)) C.viewers.push(pin);
  renderViewers();
}
function removeViewer(pin) {
  C.viewers = C.viewers.filter(v => v !== pin);
  renderViewers();
}
function renderViewers() {
  const box = document.getElementById('viewersBox');
  if (!C.viewers.length) { box.innerHTML = ''; return; }
  box.innerHTML = 'CONNECTED: ' + C.viewers.map(v =>
    `<span class="viewer-chip"><span class="vd"></span>${v}</span>`
  ).join('');
}

// ── Log ──
function log(title, sub, type) {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = `log-line ${type||''}`;
  d.innerHTML = `<em>${title}</em>${sub ? ' — ' + sub : ''}`;
  el.insertBefore(d, el.firstChild);
  while (el.children.length > 8) el.removeChild(el.lastChild);
}

// ── Start ──
init();
</script>

</body>
</html>
